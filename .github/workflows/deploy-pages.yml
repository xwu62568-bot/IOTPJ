name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            APP/package-lock.json
            iot-unified-saas/package-lock.json

      - name: Install APP dependencies
        working-directory: APP
        run: npm ci

      - name: Build APP
        working-directory: APP
        env:
          VITE_DEPLOY_TARGET: github-pages
          VITE_BASE_PATH: /IOTPJ/
        run: npm run build

      - name: Install iot-unified-saas dependencies
        working-directory: iot-unified-saas
        run: npm ci

      - name: Build iot-unified-saas
        working-directory: iot-unified-saas
        env:
          VITE_DEPLOY_TARGET: github-pages
          VITE_BASE_PATH: /IOTPJ/saas/
        run: npm run build

      - name: Copy SaaS build into Pages bundle
        run: mkdir -p APP/dist/saas && cp -r iot-unified-saas/dist/. APP/dist/saas/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: APP/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
